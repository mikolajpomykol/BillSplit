<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moja Strona z Supabase</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div style="padding: 20px; font-family: sans-serif;">
    <h2>Wpisz swoją liczbę</h2>
    
    <input type="number" step="any" id="liczbaInput" placeholder="np. 42" style="padding: 8px;">
    <input type="char" placeholder="Uzytkowik" style="padding: 38px;">
    <button onclick="zapiszDoBazy()" style="padding: 8px 16px;">Zapisz</button>
    
    <p id="status"></p>
  </div>

  <script>
    console.log("1. Ładowanie skryptu rozpoczęte.");

    const supabaseUrl = 'https://eabprmsyvgznqaxtahdr.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhYnBybXN5dmd6bnFheHRhaGRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0ODA3NjQsImV4cCI6MjA4ODA1Njc2NH0.63M5d6ETIjfBlaB02-qf-kTzqjLq4JKCcW_rIdSoMww';
    
    // Zmieniliśmy nazwę zmiennej na supabaseClient, by unikać konfliktów!
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    console.log("2. Supabase poprawnie zainicjalizowany.");

    async function zapiszDoBazy() {
      console.log("3. Kliknięto przycisk Zapisz.");
      
      const input = document.getElementById('liczbaInput');
      const statusText = document.getElementById('status');
      
      const wpisanaLiczba = parseFloat(input.value.replace(',', '.'));
      console.log("Wpisana liczba to:", wpisanaLiczba);

      if (isNaN(wpisanaLiczba)) {
        statusText.innerText = "Proszę wpisać poprawną liczbę!";
        statusText.style.color = "red";
        console.log("Przerwano: Wartość nie jest liczbą.");
        return;
      }

      statusText.innerText = "Wysyłanie...";
      statusText.style.color = "black";

      const SupaTable = 'expenses';
      const SupaColumn = 'ExpenseValue';

      try {
        console.log(`4. Próba wysłania danych do tabeli "${SupaTable}"...`);
        
        // Zauważ nawiasy kwadratowe wokół [SupaColumn]
        const { data, error } = await supabaseClient
          .from(SupaTable)
          .insert([
            { [SupaColumn]: wpisanaLiczba }
          ]);

        if (error) {
          console.error('5. Błąd Supabase:', error);
          statusText.innerText = "Wystąpił błąd bazy: " + error.message;
          statusText.style.color = "red";
        } else {
          console.log('5. Sukces! Odpowiedź bazy:', data);
          statusText.innerText = "Udało się! Liczba " + wpisanaLiczba + " zapisana.";
          statusText.style.color = "green";
          input.value = ''; 
        }
      } catch (e) {
        // Ten blok wychwyci inne, krytyczne błędy skryptu
        console.error('Krytyczny błąd działania funkcji:', e);
        statusText.innerText = "Krytyczny błąd! Sprawdź konsolę (F12).";
        statusText.style.color = "red";
      }
    }
  </script>

</body>
</html>

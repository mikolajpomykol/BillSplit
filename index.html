<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moja Strona z Supabase</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div style="padding: 20px; font-family: sans-serif;">
    <h2>Wpisz swoją liczbę</h2>
    
    <input type="number" id="liczbaInput" placeholder="np. 42" style="padding: 8px;">
    <button onclick="zapiszDoBazy()" style="padding: 8px 16px;">Zapisz</button>
    
    <p id="status"></p>
  </div>

  <script>
    // 2. Inicjalizacja Supabase - wklej swoje publiczne klucze poniżej
    const supabaseUrl = 'https://eabprmsyvgznqaxtahdr.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhYnBybXN5dmd6bnFheHRhaGRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0ODA3NjQsImV4cCI6MjA4ODA1Njc2NH0.63M5d6ETIjfBlaB02-qf-kTzqjLq4JKCcW_rIdSoMww';
    
    // Tworzymy klienta Supabase
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // 3. Funkcja wysyłająca dane po kliknięciu przycisku
    async function zapiszDoBazy() {
      const input = document.getElementById('liczbaInput');
      const statusText = document.getElementById('status');
      
      // Pobieramy wartość z pola i zamieniamy na liczbę całkowitą
      const wpisanaLiczba = parseInt(input.value);

      // Zabezpieczenie, jeśli ktoś nie wpisze liczby
      if (isNaN(wpisanaLiczba)) {
        statusText.innerText = "Proszę wpisać poprawną liczbę!";
        statusText.style.color = "red";
        return;
      }

      statusText.innerText = "Wysyłanie...";
      statusText.style.color = "black";

      // Wysyłamy dane do tabeli (upewnij się, że Twoja tabela nazywa się 'user_numbers', 
      // a kolumna 'number_value')

      const SupaTable = 'expenses'
      const SupaColumn = 'ExpenseValue'


      const { data, error } = await supabase
        .from(SupaTable)
        .insert([
          { ExpenseValue: wpisanaLiczba }
        ]);

      // Sprawdzamy, czy wystąpił błąd (np. zablokowany dostęp RLS)
      if (error) {
        console.error('Błąd Supabase:', error);
        statusText.innerText = "Wystąpił błąd: " + error.message;
        statusText.style.color = "red";
      } else {
        statusText.innerText = "Udało się! Liczba " + wpisanaLiczba + " zapisana.";
        statusText.style.color = "green";
        input.value = ''; // Czyszczenie pola po sukcesie
      }
    }
  </script>

</body>
</html>
